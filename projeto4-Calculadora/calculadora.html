<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="title">Calculadora</h1>

   
        <label >Digite o primeiro numero:</label>
        <input type="number" id="numero1" name="numero1">

         <label>Digite a operação:</label>
        <input type="text" id="operacao" name="operacao">

         <label>Digite o segundo numero:</label>
        <input type="number" id="numero2" name="numero2">

        <button  type="button" id="calculando">Calcular</button>

        <p>O resultado da operação é: <span id="resultado"></span></p>

   
</body>
</html>
